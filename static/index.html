<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with [Your Name]'s AI Proxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a18;
    --ink-soft: #4a4a46;
    --ink-faint: #9a9a94;
    --paper: #f5f3ee;
    --paper-warm: #ede9e1;
    --paper-card: #faf8f4;
    --accent: #c8522a;
    --accent-light: #f0ddd6;
    --border: rgba(26,26,24,0.1);
    --radius: 16px;
    --font-serif: 'Instrument Serif', Georgia, serif;
    --font-sans: 'DM Sans', system-ui, sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--paper);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--paper-card);
    flex-shrink: 0;
  }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
    font-style: italic;
  }

  .header-text h1 {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 300;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #4caf7d;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 0 2px #cceedd;
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    scroll-behavior: smooth;
  }

  .messages-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Welcome state */
  .welcome {
    text-align: center;
    padding: 48px 24px 24px;
  }

  .welcome h2 {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 400;
    font-style: italic;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .welcome p {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    max-width: 360px;
    margin: 0 auto 28px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
    margin: 0 auto;
  }

  .suggestion {
    background: var(--paper-card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s;
    font-weight: 300;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  /* Messages */
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 500;
  }

  .msg.assistant .msg-avatar {
    background: var(--accent);
    color: #fff;
    font-family: var(--font-serif);
    font-style: italic;
  }

  .msg.user .msg-avatar {
    background: var(--paper-warm);
    color: var(--ink-soft);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    font-weight: 300;
  }

  .msg.assistant .bubble {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--ink);
  }

  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-top-right-radius: 4px;
    font-weight: 400;
  }

  /* Typing indicator */
  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input area */
  footer {
    padding: 16px 20px 20px;
    background: var(--paper-card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 15px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.15s;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--ink-faint); }
  textarea:focus { border-color: var(--accent); }

  #send {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  #send:hover { opacity: 0.88; }
  #send:active { transform: scale(0.95); }
  #send:disabled { opacity: 0.35; cursor: default; }

  #send svg { width: 18px; height: 18px; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 8px;
    max-width: 700px;
    margin-inline: auto;
  }
  /* Markdown rendered content */
  .bubble p { margin-bottom: 0.5em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 1.4em; margin-bottom: 0.5em; }
  .bubble li { margin-bottom: 0.2em; }
  .bubble strong { font-weight: 500; }
  .bubble code { font-family: monospace; font-size: 13px; background: var(--paper-warm); padding: 1px 5px; border-radius: 4px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<header>
  <div class="avatar">A</div>
  <div class="header-text">
    <h1>Chat with Rahul</h1>
    <p>AI Proxy · Answers questions on his behalf</p>
  </div>
  <div class="status-dot" title="Online"></div>
</header>

<div id="chat">
  <div class="messages-inner" id="messages">
    <div class="welcome" id="welcome">
      <h2>Ask me anything.</h2>
      <p>I'm an AI standing in for Rahul Kumar. Ask about his background, skills, experience, or availability.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="ask(this.textContent)">What's your background?</button>
        <button class="suggestion" onclick="ask(this.textContent)">What are you looking for next?</button>
        <button class="suggestion" onclick="ask(this.textContent)">Tell me about a recent project</button>
        <button class="suggestion" onclick="ask(this.textContent)">What's your tech stack?</button>
        <button class="suggestion" onclick="ask(this.textContent)">Are you open to relocation?</button>
        <button class="suggestion" onclick="ask(this.textContent)">What's your notice period?</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Ask about experience, skills, availability…" 
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="footer-note">This is an AI proxy. For sensitive discussions, please reach out directly.</p>
</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let history = [];
  let streaming = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function ask(text) {
    inputEl.value = text;
    sendMessage();
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMsg(role, content) {
    const initials = role === 'assistant' ? 'AI' : 'You';
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const rendered = role === 'assistant' ? renderMarkdown(content) : escHtml(content);
    div.innerHTML = `
      <div class="msg-avatar">${initials}</div>
      <div class="bubble">${rendered}</div>`;
    messagesEl.appendChild(div);
    scrollBottom();
    return div.querySelector('.bubble');
  }

  function appendTyping() {
    const div = document.createElement('div');
    div.className = 'msg assistant typing';
    div.id = 'typing';
    div.innerHTML = `<div class="msg-avatar">AI</div>
      <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function scrollBottom() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(s) {
    return marked.parse(s);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    removeWelcome();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    streaming = true;

    history.push({ role: 'user', content: text });
    appendMsg('user', text);
    appendTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) throw new Error('Server error');

      removeTyping();
      const bubble = appendMsg('assistant', '');
      let full = '';

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const { text } = JSON.parse(data);
            full += text;
            bubble.innerHTML = renderMarkdown(full);
            scrollBottom();
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: full });

    } catch (err) {
      removeTyping();
      appendMsg('assistant', 'Something went wrong. Please try again.');
      console.error(err);
    } finally {
      streaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.focus();
</script>
</body>
</html>
